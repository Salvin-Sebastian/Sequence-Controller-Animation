<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width">
    <title>Sequence Controller - Premium</title>
    <!-- Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
    <script type="text/javascript" src="main.js" defer></script>
  </head>
  <body>
    <!-- Ambient background glows -->
    <div class="ambient-glow glow-1"></div>
    <div class="ambient-glow glow-2"></div>
    
    <div class="container">
      <div class="card glass-panel">
        <h1 class="title">Sequence Controller<span class="dot">.</span></h1>
        
        <div class="control-group">
          <label for="pattern-select">Animation Pattern</label>
          <div class="select-wrapper">
            <select id="pattern-select">
              <option value="linear">Linear Matrix (L → R)</option>
              <option value="reverse">Reverse Echo (R → L)</option>
              <option value="random">Quantum Chaos (Random)</option>
              <option value="center">Nova Core (Center Out)</option>
            </select>
          </div>
        </div>

        <div class="shapes-container" id="shapes-stage">
          <div class="shape circle red" id="shape-0"></div>
          <div class="shape square yellow" id="shape-1"></div>
          <div class="shape rounded-square green" id="shape-2"></div>
          <div class="shape circle blue" id="shape-3"></div>
          <div class="shape square purple" id="shape-4"></div>
        </div>

        <button id="play-btn" class="play-btn">
          <span class="btn-text">Initiate Sequence</span>
          <div class="btn-glow"></div>
        </button>
      </div>
    </div>
  </body>
</html>
