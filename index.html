<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width">
    <title>Sequencing animations</title>
    <!-- Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
    <script type="text/javascript" src="main.js" defer></script>
    <link href="style.css" rel="stylesheet">
  </head>

  <body>
    <div class="controls-panel">
      <h1>Animation Control</h1>
      <div class="selector-wrapper">
        <label for="sequence-selector">Sequence Mode</label>
        <div class="custom-select">
          <select id="sequence-selector">
            <option value="linear">Linear Matrix (L → R)</option>
            <option value="reverse">Reverse Echo (R → L)</option>
            <option value="random">Quantum Chaos (Random)</option>
            <option value="nova">Nova Core (Center Out)</option>
          </select>
        </div>
      </div>
      <button id="play-button">Initiate Sequence</button>
    </div>

    <div id="alice-container">
      <img id="alice1" src="alice.svg" role="img" alt="Alice 1">
      <img id="alice2" src="alice.svg" role="img" alt="Alice 2">
      <img id="alice3" src="alice.svg" role="img" alt="Alice 3">
    </div>
  </body>
</html>
